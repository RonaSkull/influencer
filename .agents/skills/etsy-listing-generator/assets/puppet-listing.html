<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; }

.canvas {
  position: relative;
  width: 1400px;
  height: 2000px;
  background: #FFFFFF;
  overflow: hidden;
}

.banner {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 280px;
  background: linear-gradient(178deg, #4D6840 0%, #425A36 100%);
  z-index: 10;
}

.badge {
  position: absolute;
  top: 30px;
  padding: 14px 34px;
  background: linear-gradient(140deg, #EDCD5E 0%, #D4A843 50%, #C49A3C 100%);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 26px;
  letter-spacing: 2px;
  border-radius: 60px;
  z-index: 20;
  box-shadow: 0 4px 16px rgba(196,154,60,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  text-transform: uppercase;
}
.badge-left { left: 36px; }
.badge-right { right: 36px; }

.product-area {
  position: absolute;
  top: 90px; left: 0; right: 0; bottom: 280px;
  overflow: hidden;
  z-index: 5;
}
.product-area img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
}

.title {
  position: absolute;
  bottom: 140px;
  left: 60px; right: 60px;
  text-align: center;
  z-index: 15;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 56px;
  font-weight: 700;
  line-height: 1.12;
  text-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

.divider {
  position: absolute;
  bottom: 110px;
  left: 50%; transform: translateX(-50%);
  z-index: 15;
  display: flex;
  align-items: center;
  gap: 16px;
}
.divider-line { width: 80px; height: 2px; background: linear-gradient(90deg, transparent, rgba(237,205,94,0.5), transparent); }
.divider-diamond { width: 10px; height: 10px; background: #EDCD5E; transform: rotate(45deg); box-shadow: 0 0 8px rgba(237,205,94,0.3); }

.subtitle {
  position: absolute;
  bottom: 50px;
  left: 100px; right: 100px;
  text-align: center;
  z-index: 15;
  color: rgba(255,255,255,0.7);
  font-size: 42px;
  font-family: 'Poppins', sans-serif;
  font-weight: 400;
  letter-spacing: 1px;
}

.shop-brand {
  position: absolute;
  bottom: 12px; right: 36px;
  z-index: 15;
  color: rgba(255,255,255,0.18);
  font-size: 18px;
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="badge badge-left">BADGE_LEFT_TEXT</div>
  <div class="badge badge-right">INSTANT DOWNLOAD</div>
  <div class="product-area">
    <img src="PRODUCT_IMAGE_URL" alt="Product" />
  </div>
  <div class="banner"></div>
  <div class="title">TITLE_TEXT</div>
  <!-- -->
  <div class="subtitle">SUBTITLE_TEXT</div>
  <div class="shop-brand">TheSunDaisy</div>
</div>
</body>
</html>
